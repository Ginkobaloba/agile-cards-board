# Nginx config for the frontend container. Serves the built React app and
# forwards API + SSE traffic to the backend service on the compose network.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets, with SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST proxy.
    location /api/ {
        proxy_pass         http://backend:4070;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE proxy. Disable buffering so events stream in real time.
    location /events {
        proxy_pass         http://backend:4070;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding on;
    }
}
