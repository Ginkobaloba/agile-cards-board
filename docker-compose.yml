# docker-compose for agile-cards-board.
#
# Single-host run. Backend talks to a bind-mounted card store on the host
# and persists SQLite to a named volume. Nginx serves the built frontend
# static files and proxies /api + /events to the backend.

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: agile-cards-board-backend
    restart: unless-stopped
    environment:
      PORT: "4070"
      CARDS_DIR: "/cards"
      DB_PATH: "/data/board.sqlite"
      CORS_ORIGIN: "http://localhost:8080"
      LOG_LEVEL: "info"
    volumes:
      # Host card store. Edit the source path on the left for your machine.
      - "C:/dev/todo:/cards:rw"
      - "board-data:/data"
    ports:
      # Expose for direct debugging. Nginx proxies in normal use.
      - "4070:4070"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: agile-cards-board-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  board-data:
